<!doctype html><html lang="ru"><head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Профиль | EduNexus</title><link rel="stylesheet" href="styles.css"/></head>
<body data-page="profile"><main class="container section">
  <div class="card" style="max-width:680px;margin:30px auto;">
    <h2>Личный кабинет</h2>
    <div id="profile-data" class="small"></div>
    <img id="avatar" alt="avatar" style="width:96px;height:96px;border-radius:50%;object-fit:cover;border:2px solid #bfdbfe;margin:12px 0" />
    <form id="avatar-form"><input type="file" name="avatar" accept="image/png,image/jpeg" required /><button type="submit">Загрузить аватар</button></form>
    <p id="avatar-msg" class="small"></p>
  </div>
</main><script src="app.js"></script></body></html>
