<!doctype html><html lang="ru"><head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Регистрация | EduNexus</title><link rel="stylesheet" href="styles.css"/></head>
<body data-page="register"><main class="container section">
  <div class="card" style="max-width:540px;margin:48px auto;">
    <h2>Регистрация</h2>
    <form id="register-form">
      <input type="email" name="email" placeholder="Email" required />
      <input type="password" name="password" placeholder="Пароль" required minlength="6" />
      <select name="role" required>
        <option value="student">Ученик</option><option value="teacher">Учитель</option><option value="admin">Администратор</option>
      </select>
      <button type="submit">Создать аккаунт</button>
    </form>
    <p id="register-msg" class="small"></p>
  </div>
</main><script src="app.js"></script></body></html>
